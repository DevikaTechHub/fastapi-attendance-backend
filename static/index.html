<!DOCTYPE html>
<html>
<head>
    <title>Live Attendance</title>
</head>
<body>

    <h2>Live Attendance System</h2>

    <h3>Login</h3>
    <input type="email" id="email" placeholder="Email">
    <br><br>

    <input type="password" id="password" placeholder="Password">
    <br><br>

    <button onclick="login()">Login</button>

    <hr>

    <h3>Attendance</h3>

    <video id="camera" autoplay playsinline width="300"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <br><br>

    <button onclick="clockIn()">Clock In</button>
    <br><br>

    <button onclick="clockOut()">Clock Out</button>

    <pre id="result">Login first, then allow GPS and camera permission.</pre>

    <script>
        let cameraStream = null;

        const result = document.getElementById("result");
        const video = document.getElementById("camera");
        const canvas = document.getElementById("canvas");

        async function login() {

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const formData = new FormData();

            formData.append(
                "username",
                email
            );

            formData.append(
                "password",
                password
            );

            try {
                const response = await fetch(
                    "/login",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    result.innerText = data.detail || "Login failed";
                    return;
                }

                localStorage.setItem(
                    "token",
                    data.access_token
                );

                result.innerText =
                "Login successful. Now click Clock In or Clock Out.";

            } catch (error) {
                result.innerText =
                "Login error: " + error.message;
            }
        }


        function getLivePosition() {

            return new Promise(function(resolve, reject) {

                if (!navigator.geolocation) {
                    reject(
                        new Error("GPS is not supported in this browser")
                    );
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    resolve,
                    reject,
                    {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    }
                );
            });
        }


        async function startCamera() {

            if (cameraStream) {
                return;
            }

            cameraStream =
            await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "user"
                },
                audio: false
            });

            video.srcObject = cameraStream;

            await video.play();
        }


        async function captureLiveImage() {

            await startCamera();

            if (
                video.videoWidth === 0 ||
                video.videoHeight === 0
            ) {
                throw new Error(
                    "Camera not ready. Please try again."
                );
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const context = canvas.getContext("2d");

            context.drawImage(
                video,
                0,
                0,
                canvas.width,
                canvas.height
            );

            return new Promise(function(resolve, reject) {

                canvas.toBlob(
                    function(blob) {

                        if (!blob) {
                            reject(
                                new Error("Image capture failed")
                            );
                            return;
                        }

                        resolve(blob);

                    },
                    "image/jpeg",
                    0.95
                );
            });
        }


        async function sendAttendance(endpoint, filename) {

            const token = localStorage.getItem("token");

            if (!token) {
                result.innerText = "Please login first";
                return;
            }

            result.innerText =
            "Requesting live GPS and camera permission...";

            try {
                const position = await getLivePosition();

                const imageBlob = await captureLiveImage();

                const capturedAt = new Date().toISOString();

                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                const formData = new FormData();

                formData.append(
                    "image",
                    imageBlob,
                    filename
                );

                formData.append(
                    "latitude",
                    latitude
                );

                formData.append(
                    "longitude",
                    longitude
                );

                formData.append(
                    "accuracy",
                    accuracy
                );

                formData.append(
                    "captured_at",
                    capturedAt
                );

                const response = await fetch(
                    endpoint,
                    {
                        method: "POST",
                        headers: {
                            "Authorization": "Bearer " + token
                        },
                        body: formData
                    }
                );

                const data = await response.json();

                result.innerText =
                JSON.stringify(
                    data,
                    null,
                    2
                );

            } catch (error) {
                result.innerText =
                "Attendance error: " + error.message;
            }
        }


        function clockIn() {
            sendAttendance(
                "/clock-in",
                "clockin.jpg"
            );
        }


        function clockOut() {
            sendAttendance(
                "/clock-out",
                "clockout.jpg"
            );
        }
    </script>

</body>
</html>
